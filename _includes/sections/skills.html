<style>
    .skill-tag {
        display: inline-block;
        background-color: rgba(54, 162, 235, 0.3); 
        color: #004a8f;
        border: 1px solid #38b6ff;
        padding: 8px 16px;
        margin: 6px;
        border-radius: 20px;
        font-size: 15px;
        font-weight: 500;
        transition: all 0.2s ease-in-out;
    }
    
    .skill-tag:hover {
        background-color: rgba(54, 162, 235, 0.5);
    }
</style>

<div class="container">
    <div class="row">
        <div class="col-lg-12 text-center" id="i18_skills">
            <div class="navy-line"></div>
            <h1><span data-i18n="skills.my_skills">My skills</span></h1>
        </div>
    </div>
    <div class="row features-block">
        <div class="wow zoomIn col-lg-10 col-lg-offset-1 text-center">
            
            {% assign skills_list = site.data.index.skills.aspects | split: "," %}
            {% for skill in skills_list %}
                <span class="skill-tag">{{ skill | strip }}</span>
            {% endfor %}
            
        </div>
    </div>
</div>
