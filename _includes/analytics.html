<!-- Google Analytics (GA4) -->
{% if site.ga %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.ga.id }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', '{{ site.ga.id }}');
  </script>
{% endif %}

<!-- GrowingIO -->
{% if site.gio %}
  <script>
    var _vds = _vds || [];
    window._vds = _vds;
    (function(){
      _vds.push(['setAccountId', '{{ site.gio.id }}']);
      (function() {
        var vds = document.createElement('script');
        vds.type = 'text/javascript';
        vds.async = true;
        vds.src = 'https://dn-growing.qbox.me/vds.js';  // Ensuring HTTPS
        var s = document.getElementsByTagName('script')[0];
        s.parentNode.insertBefore(vds, s);
      })();
    })();
  </script>
{% endif %}
