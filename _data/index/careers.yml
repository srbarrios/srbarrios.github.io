- name:
    detail: SUSE
    i18n: suse
  desc:
    detail: >
      Quality Engineering Architect for Multi-Linux Manager. <br><br>
      Leading the technical strategy for scalable, observable, and developer-friendly test automation. I focus on test architecture, tooling, Test Infrastructure as Code (IaC), and End-to-End automation strategy, driving a full TestOps transformation within a fast-moving open-source environment.<br><br>
      <h4>Key Engineering Contributions</h4>
      <ul>
      <li><b>AI & Automation:</b> Developed an AI-powered PR analysis tool for coverage gaps and lead smart PR E2E test selection based on code coverage (presented at SeleniumConf 2025).</li>
      <li><b>Infrastructure & Observability:</b> Integrated CI synthetic monitoring via Prometheus Push Gateway and built historical flaky test tracking dashboards in Grafana.</li>
      <li><b>Scalability:</b> Built a maintenance validation pipeline capable of running automated E2E tests across 70+ systems in parallel.</li>
      <li><b>Developer Experience:</b> Developed and maintain DevContainers to standardize contributor IDE environments and linked GitHub boards to HTML reports for full issue traceability.</li>
      <li><b>Mentorship:</b> Mentoring Google Summer of Code 2025 students on ML-based test selection models.</li>
      </ul>
      <h4>Speaking & Community</h4>
      <ul>
      <li>Featured speaker at SeleniumConf (2025, 2026), openSUSECon, and SUSECon.</li>
      <li>Co-creator of SUSE’s internal monthly DevOps Meetup.</li>
      </ul>
      <h4>Tech Stack</h4>
      Terraform, Salt, Prometheus, Grafana, GitHub Actions, Jenkins, Ruby, Python, Bash, Cucumber, Docker, AWS, Azure, GCP, DevContainers, Ollama, and Gemini APIs.
