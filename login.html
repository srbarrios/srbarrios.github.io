---
layout: default
title: Sample Login Page
---

<style>
    .login-container {
        background: white;
        padding: 2em;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .login-container h2 {
        text-align: center;
        margin-bottom: 1em;
    }
    .form-group {
        margin-bottom: 1em;
    }
    .form-group label {
        display: block;
        margin-bottom: 0.5em;
    }
    .form-group input {
        width: 100%;
        padding: 0.5em;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    .login-button {
        width: 100%;
        padding: 0.75em;
        background-color: #007BFF;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1em;
    }
    .login-button:hover {
        background-color: #0056b3;
    }
    #error-message {
        color: red;
        text-align: center;
        margin-top: 1em;
        display: none;
    }
</style>

<div class="login-container">
    <h2>Fake Login</h2>
    <form id="login-form">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="password">
        </div>
        <button type="submit" id="login-btn" class="login-button">Login</button>
    </form>
    <p id="error-message">Incorrect username or password. Please try again.</p>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', function(event) {
        event.preventDefault();

        var username = document.getElementById('username').value;
        var password = document.getElementById('password').value;
        var errorMessage = document.getElementById('error-message');

        var correctUsername = 'testuser';
        var correctPassword = 'testpass';

        if (username === correctUsername && password === correctPassword) {
            window.location.href = '/login-success.html';
        } else {
            errorMessage.style.display = 'block';
        }
    });
</script>
